name: zimabrain-ce

services:
  zimabrain-ce:
    image: gelbuilding/zimabrain-ce:1.6.1-beta
    container_name: zimabrain-ce
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "8601:8601"
    volumes:
      - /DATA/AppData/zimabrain-ce:/data
      - /DATA/AppData/zimabrain-ce/docs:/app/docs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: Timezone
      ports:
        - container: "8601"
          description:
            en_us: Web UI
      volumes:
        - container: /data
          description:
            en_us: ZimaBrain CE persistent data and reports
    labels:
      icon: https://raw.githubusercontent.com/Jacko88888/zimabrain-ce/main/app/assets/zimabrain-ce-logo.svg
      title: ZimaBrain CE
      description: Local ZimaOS diagnostic assistant
      index: /
      scheme: http
      port_map: "8601"
