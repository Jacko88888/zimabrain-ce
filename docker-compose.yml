name: zimabrain-ce

services:
  zimabrain-ce:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zimabrain-ce
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "8601:8601"
    volumes:
      - /DATA/AppData/zimabrain-ce:/data
      - /DATA/AppData/zimabrain-ce/docs:/app/docs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: Timezone
      ports:
        - container: "8601"
          description:
            en_us: Web UI
      volumes:
        - container: /data
          description:
            en_us: ZimaBrain CE data and reports
    labels:
      icon: https://raw.githubusercontent.com/IceWhaleTech/CasaOS-AppStore/main/Apps/HomeAssistant/icon.png
      title: ZimaBrain CE
      description: Reliable ZimaBrain Flask cockpit
      index: /
      scheme: http
      port_map: "8601"
