name: zimabrain-ce-flask-8601

services:
  zimabrain-ce-flask-8601:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zimabrain-ce-flask-8601
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "8601:8601"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8601/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - /DATA/AppData/zimabrain-ce-flask-8601:/data
      - /DATA/AppData/zimabrain-ce-flask-8601/docs:/app/docs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: Timezone
      ports:
        - container: "8601"
          description:
            en_us: Web UI
      volumes:
        - container: /data
          description:
            en_us: ZimaBrain CE data and reports
    labels:
      icon: https://raw.githubusercontent.com/IceWhaleTech/CasaOS-AppStore/main/Apps/HomeAssistant/icon.png
      title: ZimaBrain CE
      description: Reliable ZimaBrain Flask cockpit
      index: /
      scheme: http
      port_map: "8601"
